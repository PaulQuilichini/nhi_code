[default]
model = "deepseek-v4-pro"
mode = "agent"
provider = "deepseek"

[[providers]]
id = "deepseek"
type = "openai-compatible"
base_url = "https://api.deepseek.com"
api_key_env = "DEEPSEEK_API_KEY"
default_model = "deepseek-v4-pro"
generation_config = { reasoning_effort = "high", thinking = { type = "enabled" } }

[[providers]]
id = "kimi"
type = "openai-compatible"
base_url = "https://api.moonshot.ai/v1"
api_key_env = "MOONSHOT_API_KEY"
default_model = "kimi-k2.6"
generation_config = { thinking = { type = "enabled" } }

[[providers]]
id = "kimi-code"
type = "openai-compatible"
base_url = "https://api.kimi.com/coding/v1"
api_key_env = "KIMI_CODE_API_KEY"
default_model = "kimi-for-coding"

[[providers]]
id = "qwen"
type = "openai-compatible"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key_env = "DASHSCOPE_API_KEY"
default_model = "qwen3-coder-plus"

[policy]
default_profile = "workspace-write"
default_approval = "on-request"

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 0
model_idle_timeout_seconds = 300
model_request_timeout_seconds = 1800
shell_timeout_seconds = 1800
context_input_tokens = 128000
context_output_reserve_tokens = 64000
context_tool_reserve_tokens = 16000
context_recent_tokens = 16000
context_working_memory_tokens = 6000
context_observation_tokens = 24000
context_dynamic_tokens = 2000
context_file_evidence_tokens = 48000

[windows]
sandbox = "unelevated"

[darwin]
sandbox = "seatbelt"
